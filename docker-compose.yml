services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: livewire4poc_app
    restart: unless-stopped
    ports:
      - "8002:80"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=livewire4poc
      - DB_USERNAME=livewire_user
      - DB_PASSWORD=secret
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - app_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - livewire_network

  mysql:
    image: mysql:8.0
    container_name: livewire4poc_mysql
    restart: unless-stopped
    ports:
      - "3309:3306"
    environment:
      MYSQL_DATABASE: livewire4poc
      MYSQL_USER: livewire_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5
    networks:
      - livewire_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: livewire4poc_phpmyadmin
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: livewire_user
      PMA_PASSWORD: secret
      UPLOAD_LIMIT: 64M
    depends_on:
      - mysql
    networks:
      - livewire_network

networks:
  livewire_network:
    driver: bridge

volumes:
  mysql_data:
  app_storage:
